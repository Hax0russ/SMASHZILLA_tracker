<title>SmashZilla Cash</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff;
    font-family: -apple-system, system-ui, sans-serif; overscroll-behavior: none; }
  .wrap { max-width: 680px; margin: 0 auto; min-height: 100vh;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; }
  .brand { color: #22c55e; font-weight: 800; letter-spacing: .5px; font-size: 17px; }
  .items-label { color: #71717a; font-size: 14px; }
  .total { font-size: 60px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 4px 0 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { border: none; border-radius: 18px; padding: 26px 16px; text-align: left;
    position: relative; transition: transform .05s; cursor: pointer; }
  .btn:active { transform: scale(.95); }
  .btn.grey { background: #27272a; color: #fff; }
  .btn.green { background: #22c55e; color: #0a0a0a; }
  .btn .name { font-size: 20px; font-weight: 700; line-height: 1.1; }
  .btn .price { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .btn.grey .price { color: #a1a1aa; }
  .btn.green .price { color: #166534; }
  .badge { position: absolute; top: 12px; right: 12px; min-width: 32px; height: 32px;
    padding: 0 8px; border-radius: 999px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; }
  .btn.grey .badge { background: #22c55e; color: #0a0a0a; }
  .btn.green .badge { background: #0a0a0a; color: #22c55e; }
  .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 16px; }
  .act { border: none; background: #27272a; color: #fff; border-radius: 14px; padding: 16px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: transform .05s; }
  .act:active { transform: scale(.95); }
  .act:disabled { opacity: .3; }
  .act .ico { font-size: 22px; }
  .act .lbl { font-size: 12px; color: #a1a1aa; }
  .spacer { flex: 1; }
  /* summary */
  .panel { background: #18181b; border-radius: 18px; padding: 20px; flex: 1; }
  .row { display: flex; justify-content: space-between; font-size: 18px; padding: 6px 0; }
  .row .q { color: #71717a; }
  .row .amt { font-variant-numeric: tabular-nums; font-weight: 600; }
  .grand { border-top: 1px solid #3f3f46; margin-top: 12px; padding-top: 14px;
    font-size: 24px; font-weight: 800; }
  .grand .amt { color: #22c55e; }
  .empty { color: #71717a; text-align: center; padding: 40px 0; }
  .sumacts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .primary { background: #22c55e; color: #0a0a0a; font-weight: 700; border: none; border-radius: 14px; padding: 16px; cursor: pointer; }
  .ghost { background: #27272a; color: #fff; font-weight: 700; border: none; border-radius: 14px; padding: 16px; cursor: pointer; }
  /* modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none;
    align-items: center; justify-content: center; padding: 24px; z-index: 10; }
  .modal.show { display: flex; }
  .card { background: #18181b; border-radius: 18px; padding: 24px; max-width: 360px; width: 100%; }
  .card h2 { margin: 0 0 8px; font-size: 20px; }
  .card p { color: #a1a1aa; margin: 0 0 20px; }
  .card .mb { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .keep { background: #3f3f46; color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer; }
  .clear { background: #ef4444; color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <span class="brand">SMASHZILLA · CASH</span>
    <span class="items-label"><span id="itemCount">0</span> items</span>
  </div>
  <div class="total">$<span id="total">0.00</span></div>

  <div id="logView">
    <div class="grid" id="grid"></div>
    <div class="actions">
      <button class="act" id="undoBtn"><span class="ico">&#8634;</span><span class="lbl" id="undoLbl">Undo</span></button>
      <button class="act" id="summaryBtn"><span class="ico">&#9776;</span><span class="lbl">Summary</span></button>
      <button class="act" id="resetBtn"><span class="ico">&#10227;</span><span class="lbl">New event</span></button>
    </div>
  </div>

  <div id="summaryView" class="hidden" style="display:flex;flex-direction:column;flex:1;">
    <div class="panel" id="summaryPanel"></div>
    <div class="sumacts">
      <button class="primary" id="copyBtn">Copy summary</button>
      <button class="ghost" id="backBtn">Back to tracker</button>
    </div>
  </div>
  <div class="spacer"></div>
</div>

<div class="modal" id="modal">
  <div class="card">
    <h2>Start a new event?</h2>
    <p id="modalText"></p>
    <div class="mb">
      <button class="keep" id="keepBtn">Keep</button>
      <button class="clear" id="clearBtn">Clear</button>
    </div>
  </div>
</div>

<script>
  var MENU = [
    { id: "classic_single", name: "Classic Single", price: 11.50, hero: false },
    { id: "classic_double", name: "Classic Double", price: 13.50, hero: false },
    { id: "zilla_single",  name: "SmashZilla Single", price: 12.50, hero: true },
    { id: "zilla_double",  name: "SmashZilla Double", price: 14.50, hero: true }
  ];
  var KEY = "smashzilla-cash-tracker";
  var log = [];

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) { var p = JSON.parse(raw); if (Array.isArray(p.log)) log = p.log; }
    } catch (e) {}
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ log: log })); } catch (e) {}
  }
  function total() { return log.reduce(function(s,e){return s+e.price;},0); }
  function qty(id) { return log.filter(function(e){return e.item===id;}).length; }

  function render() {
    document.getElementById("total").textContent = total().toFixed(2);
    document.getElementById("itemCount").textContent = log.length;
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    MENU.forEach(function(m){
      var q = qty(m.id);
      var b = document.createElement("button");
      b.className = "btn " + (m.hero ? "green" : "grey");
      b.innerHTML = '<div class="name">'+m.name+'</div><div class="price">$'+m.price.toFixed(2)+'</div>'
        + (q>0 ? '<div class="badge">'+q+'</div>' : '');
      b.onclick = function(){ addItem(m); };
      grid.appendChild(b);
    });
    var undoBtn = document.getElementById("undoBtn");
    undoBtn.disabled = log.length === 0;
    var last = log[log.length-1];
    document.getElementById("undoLbl").textContent = last ? ("Undo " + last.name.split(" ")[0]) : "Undo";
  }

  function addItem(m) {
    log.push({ item: m.id, name: m.name, price: m.price, time: Date.now() });
    save(); render();
  }
  function undo() { if (log.length) { log.pop(); save(); render(); } }

  function showSummary() {
    var panel = document.getElementById("summaryPanel");
    var rows = MENU.filter(function(m){return qty(m.id)>0;});
    if (!rows.length) { panel.innerHTML = '<div class="empty">No cash sales logged yet.</div>'; }
    else {
      var html = "";
      rows.forEach(function(m){
        var q = qty(m.id);
        html += '<div class="row"><span>'+m.name+' <span class="q">x'+q+'</span></span>'
              + '<span class="amt">$'+(q*m.price).toFixed(2)+'</span></div>';
      });
      html += '<div class="row grand"><span>Total</span><span class="amt">$'+total().toFixed(2)+'</span></div>';
      panel.innerHTML = html;
    }
    document.getElementById("logView").classList.add("hidden");
    document.getElementById("summaryView").classList.remove("hidden");
  }
  function backToLog() {
    document.getElementById("summaryView").classList.add("hidden");
    document.getElementById("logView").classList.remove("hidden");
  }

  function summaryText() {
    var lines = ["SmashZilla - Cash Takings", new Date().toLocaleString(), ""];
    MENU.forEach(function(m){ var q=qty(m.id); if(q>0) lines.push(m.name+"  x"+q+"  =  $"+(q*m.price).toFixed(2)); });
    lines.push(""); lines.push("Items: "+log.length); lines.push("CASH TOTAL: $"+total().toFixed(2));
    return lines.join("\n");
  }
  function copySummary() {
    var t = summaryText();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(t).then(function(){ flash(); }, function(){ legacyCopy(t); });
    } else { legacyCopy(t); }
  }
  function legacyCopy(t){
    var ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); flash();
  }
  function flash(){
    var b=document.getElementById("copyBtn"); var o=b.textContent;
    b.textContent="Copied!"; setTimeout(function(){b.textContent=o;},1800);
  }

  function openModal(){
    document.getElementById("modalText").textContent =
      "This clears the current tally ($"+total().toFixed(2)+", "+log.length+" items). Copy your summary first if you need it.";
    document.getElementById("modal").classList.add("show");
  }
  function closeModal(){ document.getElementById("modal").classList.remove("show"); }
  function doReset(){ log=[]; save(); render(); closeModal(); backToLog(); }

  document.getElementById("undoBtn").onclick = undo;
  document.getElementById("summaryBtn").onclick = showSummary;
  document.getElementById("resetBtn").onclick = openModal;
  document.getElementById("copyBtn").onclick = copySummary;
  document.getElementById("backBtn").onclick = backToLog;
  document.getElementById("keepBtn").onclick = closeModal;
  document.getElementById("clearBtn").onclick = doReset;

  load(); render();
</script>
</body>
</html>
